plugin_slug: verge_labs/google_people_oauth
namespace: verge_labs
author: Verge Labs
display_name: Google Contacts
auth_scheme: oauth2_user
description: |
  Look up the people in your Google Contacts — family, neighbours, the
  plumber, the kids' school. Returns names, email addresses, and phone
  numbers. Read-only.

  Used mainly to turn a name into an address: "email the roofer we used
  last spring" or "invite my sister to dinner Saturday" both need a real
  email address before anything can be sent.

  AUTH: Connects as a specific Google user via OAuth, and reads that
  user's own contacts. For Workspace domain-directory access (the org
  address book, not personal contacts) use verge_labs/google_people
  (service account) instead.
version: 0.2.1
manifest_schema: 2

credentials:
  - name: user_token
    type: oauth2_google
    secret: true
    scopes:
      # Authorizes the personal-contacts endpoints below (searchContacts,
      # people/me/connections). Deliberately NOT directory.readonly — that
      # reads a Workspace org directory, which a household user does not
      # have, and which we have no business asking for.
      - https://www.googleapis.com/auth/contacts.readonly
    description: |
      Your Google account, connected via OAuth. Hearth will request
      read-only access to your contacts.

verbs:
  - name: search_contacts
    description: |
      Search the user's Google Contacts by name, email, or phone fragment.
      Required args: query (e.g. "Sarah", "plumber", "@school.org").
      Returns up to 30 matches with displayName, emailAddresses,
      phoneNumbers, and resourceName (needed for get_contact).

      This is the verb to use when you have a name and need an address —
      e.g. before drafting an email or adding someone to a calendar invite.

      Note: results come back under `results[].person`, not a bare list.
    grant_categories: [read]
    args:
      query:
        type: string
        required: true
    output: json
    http:
      method: GET
      url: "https://people.googleapis.com/v1/people:searchContacts?query={{args.query}}&readMask=names,emailAddresses,phoneNumbers,organizations&pageSize=30"
      headers:
        Authorization: "Bearer {{credentials.user_token.access_token}}"
      response:
        success_status: [200]

  - name: list_contacts
    description: |
      Page through the user's saved contacts. Returns up to 100 people per
      call with displayName, emailAddresses, and phoneNumbers, under a
      `connections` list. Prefer search_contacts for targeted lookups; use
      this only when you genuinely need to enumerate everyone.
    grant_categories: [read]
    output: json
    http:
      method: GET
      url: "https://people.googleapis.com/v1/people/me/connections?personFields=names,emailAddresses,phoneNumbers,organizations&sortOrder=FIRST_NAME_ASCENDING&pageSize=100"
      headers:
        Authorization: "Bearer {{credentials.user_token.access_token}}"
      response:
        success_status: [200]

  - name: get_contact
    description: |
      Fetch full details for one contact by resource name (e.g.
      "people/c12345678", as returned by search_contacts).
      Required args: resource_name. Returns names, emailAddresses,
      phoneNumbers, addresses, organizations, and biographies.
    grant_categories: [read]
    args:
      resource_name:
        type: string
        required: true
    output: json
    http:
      method: GET
      url: "https://people.googleapis.com/v1/{{args.resource_name}}?personFields=names,emailAddresses,phoneNumbers,addresses,organizations,biographies"
      headers:
        Authorization: "Bearer {{credentials.user_token.access_token}}"
      response:
        success_status: [200]

snapshot:
  description: |
    List up to 100 of the user's contacts. Used to scope IAM rules to
    specific people.
  http:
    method: GET
    url: "https://people.googleapis.com/v1/people/me/connections?personFields=names,emailAddresses&pageSize=100"
    headers:
      Authorization: "Bearer {{credentials.user_token.access_token}}"
    response:
      success_status: [200]
  extract:
    iterate: "$.connections[*]"
    entity_id: "$.resourceName"
    kind:
      literal: gpeople.person
    labels:
      name: "$.names[0].displayName"
      email: "$.emailAddresses[0].value"

default_rules:
  - action: external_resource.verge_labs/google_people_oauth.search_contacts
    decision: allow
  - action: external_resource.verge_labs/google_people_oauth.list_contacts
    decision: allow
  - action: external_resource.verge_labs/google_people_oauth.get_contact
    decision: allow
