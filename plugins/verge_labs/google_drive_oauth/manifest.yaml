plugin_slug: verge_labs/google_drive_oauth
namespace: verge_labs
author: Verge Labs
display_name: Google Drive
auth_scheme: oauth2_user
description: |
  Read and write files in Google Drive — including editing native Google
  Docs, Sheets, and Slides — via the Drive, Docs, Sheets, and Slides REST
  APIs.

  AUTH: Connects as a specific Google user via OAuth. Works with personal
  Google accounts and Google Workspace. General Drive file management is
  limited to files Hearth creates (drive.file scope), but reading and editing
  native Google Docs, Sheets, and Slides works on any such file the user
  shares by link — via the sensitive documents/spreadsheets/presentations
  scopes.

  For Workspace-wide access acting as any user, use
  verge_labs/google_drive (service account) instead.
version: 0.1.4
manifest_schema: 2

# list_folder_contents, create_file and create_folder template
# `{{args.x || config.root_folder_id || "root"}}`. The `||` coalesce operator
# was added after v1.0.2; an older binary reads the whole expression as one
# broken path and the verb errors at invocation time. Declaring the floor
# turns that into a refusal at install time with an actionable message.
#
# 1.1.0 is the release that carries the plugin-catalog work; it is the first
# tag containing `||`. If that number changes before tagging, change this too.
min_daemon_version: 1.1.0

config_schema:
  type: object
  properties:
    root_folder_id:
      type: string
      description: |
        Optional. Scope this connection to a specific Drive folder so the
        agent's default reads and new files land inside it instead of your
        whole My Drive. Paste the folder ID from the folder's URL —
        drive.google.com/drive/folders/<ID> — the <ID> part. Leave blank to
        use all of My Drive.

        Note: with the drive.file scope this connection uses, Hearth can only
        see folders it created or that you opened through Hearth, so a folder
        you made by hand in Drive may not be reachable until Hearth touches it.

credentials:
  - name: user_token
    type: oauth2_google
    secret: true
    # Scope model (each API call is authorized by whichever scope covers it):
    #   drive.file    — Drive file management (list/search/create/download/
    #                   export/move/trash/share) stays limited to files this
    #                   connection created or the user opened via a Picker.
    #                   NOT restricted.
    #   documents     — read & edit ANY of the user's Google Docs by ID.  SENSITIVE.
    #   spreadsheets  — read & edit ANY of the user's Google Sheets by ID. SENSITIVE.
    #   presentations — read & edit ANY of the user's Google Slides by ID. SENSITIVE.
    # The three native scopes are SENSITIVE, not restricted (no CASA security
    # assessment). They broaden ONLY the doc_*/sheet_*/slides_* verbs to
    # pre-existing files the user points Hearth at; they do NOT broaden the
    # Drive-API verbs. So export_file/download_file/get_file_metadata on a
    # hand-made file still require it to be Hearth-created — read pre-existing
    # Docs via doc_get, Sheets via sheet_read_range, Slides via slides_get.
    # Full cross-drive discovery/search would need drive.readonly, which IS
    # restricted — deliberately not requested.
    scopes:
      - https://www.googleapis.com/auth/drive.file
      - https://www.googleapis.com/auth/documents
      - https://www.googleapis.com/auth/spreadsheets
      - https://www.googleapis.com/auth/presentations
    description: |
      Your Google account, connected via OAuth. Hearth can manage files it
      creates in your Drive, and can read and edit any Google Doc, Sheet, or
      Slides file you share with it by link.

verbs:
  # ── Read-only ──────────────────────────────────────────────────────

  - name: list_files
    description: |
      List up to 50 non-trashed files and folders visible to the connected
      user (most recently modified first). Returns file id, name, mimeType,
      modifiedTime, size, parents. For filtered results use search_files;
      for the contents of a specific folder use list_folder_contents.
      Note: this lists across all of Drive regardless of the connection's
      base folder — call list_folder_contents (no args) to browse the base
      folder itself.
    grant_categories: [read]
    output: json
    http:
      method: GET
      url: "https://www.googleapis.com/drive/v3/files?q=trashed=false&orderBy=modifiedTime+desc&pageSize=50&fields=nextPageToken,files(id,name,mimeType,modifiedTime,size,parents)&supportsAllDrives=true&includeItemsFromAllDrives=true"
      headers:
        Authorization: "Bearer {{credentials.user_token.access_token}}"
      response:
        success_status: [200]

  - name: list_folder_contents
    description: |
      List the direct children of a folder. Optional arg: folder_id
      (the Drive file ID of the folder, or "root" for My Drive root).
      When folder_id is omitted, lists the connection's configured base
      folder (root_folder_id), or My Drive root if none is set.
      Returns id, name, mimeType, modifiedTime, size.
    grant_categories: [read]
    args:
      folder_id:
        type: string
        required: false
    output: json
    http:
      method: GET
      url: "https://www.googleapis.com/drive/v3/files?q=%27{{args.folder_id || config.root_folder_id || \"root\"}}%27+in+parents+and+trashed%3Dfalse&orderBy=name&pageSize=100&fields=nextPageToken,files(id,name,mimeType,modifiedTime,size,parents)&supportsAllDrives=true&includeItemsFromAllDrives=true"
      headers:
        Authorization: "Bearer {{credentials.user_token.access_token}}"
      response:
        success_status: [200]

  - name: get_file_metadata
    description: |
      Fetch metadata for a file or folder by its Drive file ID.
      Returns id, name, mimeType, modifiedTime, size, parents, webViewLink.
    grant_categories: [read]
    args:
      file_id:
        type: string
        required: true
    output: json
    http:
      method: GET
      url: "https://www.googleapis.com/drive/v3/files/{{args.file_id}}?fields=id,name,mimeType,modifiedTime,size,parents,webViewLink,trashed&supportsAllDrives=true"
      headers:
        Authorization: "Bearer {{credentials.user_token.access_token}}"
      response:
        success_status: [200]

  - name: download_file
    description: |
      Download the raw content of a file by its Drive file ID. Use for
      plain text, Markdown, code, CSV, PDF, and other non-Google-native
      files. For Google Docs / Sheets / Slides use export_file instead.
    grant_categories: [read]
    args:
      file_id:
        type: string
        required: true
    output: text
    http:
      method: GET
      url: "https://www.googleapis.com/drive/v3/files/{{args.file_id}}?alt=media&supportsAllDrives=true"
      headers:
        Authorization: "Bearer {{credentials.user_token.access_token}}"
      response:
        success_status: [200]

  - name: export_file
    description: |
      Export a Google Workspace file (Doc, Sheet, Slide, etc.) to a
      standard MIME type. Required args: file_id, mime_type. Common
      export targets: text/plain, text/csv, application/pdf,
      application/vnd.openxmlformats-officedocument.wordprocessingml.document.
    grant_categories: [read]
    args:
      file_id:
        type: string
        required: true
      mime_type:
        type: string
        required: true
    output: text
    http:
      method: GET
      url: "https://www.googleapis.com/drive/v3/files/{{args.file_id}}/export?mimeType={{args.mime_type}}&supportsAllDrives=true"
      headers:
        Authorization: "Bearer {{credentials.user_token.access_token}}"
      response:
        success_status: [200]

  - name: search_files
    description: |
      Search across Drive using a Drive query string (up to 50 results).
      The query follows Google's Drive query syntax:
        https://developers.google.com/drive/api/guides/search-files
      Examples:
        name contains 'budget'
        mimeType = 'text/plain'
        'folder_id' in parents and name contains 'report'
        fullText contains 'quarterly revenue'
    grant_categories: [read]
    args:
      query:
        type: string
        required: true
    output: json
    http:
      method: GET
      url: "https://www.googleapis.com/drive/v3/files?q={{args.query}}&pageSize=50&fields=files(id,name,mimeType,modifiedTime,size,parents)&supportsAllDrives=true&includeItemsFromAllDrives=true"
      headers:
        Authorization: "Bearer {{credentials.user_token.access_token}}"
      response:
        success_status: [200]

  # ── Write ──────────────────────────────────────────────────────────

  - name: create_file
    description: |
      Create a new file with metadata only (no initial content). Returns
      the new file's id and webViewLink. To set content immediately,
      follow with upload_file_content. Required args: name, mime_type.
      Optional arg: parent_id (Drive folder ID to create in; pass "root"
      for My Drive root). When parent_id is omitted, the file is created
      in the connection's configured base folder (root_folder_id), or My
      Drive root if none is set.
    grant_categories: [write]
    args:
      name:
        type: string
        required: true
      mime_type:
        type: string
        required: true
      parent_id:
        type: string
        required: false
    output: json
    http:
      method: POST
      url: "https://www.googleapis.com/drive/v3/files?fields=id,name,webViewLink&supportsAllDrives=true"
      headers:
        Authorization: "Bearer {{credentials.user_token.access_token}}"
        Content-Type: application/json
      body: |
        {"name": "{{args.name}}", "mimeType": "{{args.mime_type}}", "parents": ["{{args.parent_id || config.root_folder_id || "root"}}"]}
      response:
        success_status: [200]

  - name: upload_file_content
    description: |
      Replace the content of an existing file with new text content.
      Required args: file_id, content (the new text content), mime_type
      (content type, e.g. text/plain or text/markdown).
    grant_categories: [write]
    args:
      file_id:
        type: string
        required: true
      content:
        type: string
        required: true
      mime_type:
        type: string
        required: true
    output: json
    http:
      method: PATCH
      url: "https://www.googleapis.com/upload/drive/v3/files/{{args.file_id}}?uploadType=media&fields=id,name,modifiedTime&supportsAllDrives=true"
      headers:
        Authorization: "Bearer {{credentials.user_token.access_token}}"
        Content-Type: "{{args.mime_type}}"
      body: "{{args.content}}"
      response:
        success_status: [200]

  - name: rename_file
    description: "Rename a file or folder. Required args: file_id, name (new name)."
    grant_categories: [write]
    args:
      file_id:
        type: string
        required: true
      name:
        type: string
        required: true
    output: json
    http:
      method: PATCH
      url: "https://www.googleapis.com/drive/v3/files/{{args.file_id}}?fields=id,name&supportsAllDrives=true"
      headers:
        Authorization: "Bearer {{credentials.user_token.access_token}}"
        Content-Type: application/json
      body: |
        {"name": "{{args.name}}"}
      response:
        success_status: [200]

  - name: move_file
    description: |
      Move a file or folder to a different parent folder. Required args:
      file_id, new_parent_id, old_parent_id (obtain via get_file_metadata
      → parents[0]).
    grant_categories: [write]
    args:
      file_id:
        type: string
        required: true
      new_parent_id:
        type: string
        required: true
      old_parent_id:
        type: string
        required: true
    output: json
    http:
      method: PATCH
      url: "https://www.googleapis.com/drive/v3/files/{{args.file_id}}?addParents={{args.new_parent_id}}&removeParents={{args.old_parent_id}}&fields=id,name,parents&supportsAllDrives=true"
      headers:
        Authorization: "Bearer {{credentials.user_token.access_token}}"
        Content-Type: application/json
      body: "{}"
      response:
        success_status: [200]

  - name: create_folder
    description: |
      Create a new folder. Required arg: name. Optional arg: parent_id
      (pass "root" for My Drive root). When parent_id is omitted, the
      folder is created inside the connection's configured base folder
      (root_folder_id), or My Drive root if none is set. Returns the new
      folder's id and webViewLink.
    grant_categories: [write]
    args:
      name:
        type: string
        required: true
      parent_id:
        type: string
        required: false
    output: json
    http:
      method: POST
      url: "https://www.googleapis.com/drive/v3/files?fields=id,name,webViewLink&supportsAllDrives=true"
      headers:
        Authorization: "Bearer {{credentials.user_token.access_token}}"
        Content-Type: application/json
      body: |
        {"name": "{{args.name}}", "mimeType": "application/vnd.google-apps.folder", "parents": ["{{args.parent_id || config.root_folder_id || "root"}}"]}
      response:
        success_status: [200]

  - name: trash_file
    description: |
      Move a file or folder to the trash. Required args: file_id.
      The item can be restored from the Drive trash.
    grant_categories: [write, destructive]
    args:
      file_id:
        type: string
        required: true
    output: json
    http:
      method: PATCH
      url: "https://www.googleapis.com/drive/v3/files/{{args.file_id}}?fields=id,name,trashed&supportsAllDrives=true"
      headers:
        Authorization: "Bearer {{credentials.user_token.access_token}}"
        Content-Type: application/json
      body: |
        {"trashed": true}
      response:
        success_status: [200]

  - name: share_file
    description: |
      Grant access to a file or folder. Required args: file_id, role
      (reader / commenter / writer), type (user / group / domain / anyone),
      email_address (user or group email; empty string when type=anyone).
    grant_categories: [write, sharing]
    args:
      file_id:
        type: string
        required: true
      role:
        type: string
        required: true
      type:
        type: string
        required: true
      email_address:
        type: string
        required: true
    output: json
    http:
      method: POST
      url: "https://www.googleapis.com/drive/v3/files/{{args.file_id}}/permissions?fields=id,role,type,emailAddress&supportsAllDrives=true"
      headers:
        Authorization: "Bearer {{credentials.user_token.access_token}}"
        Content-Type: application/json
      body: |
        {"role": "{{args.role}}", "type": "{{args.type}}", "emailAddress": "{{args.email_address}}"}
      response:
        success_status: [200]

  # ── Google Docs (native document editing) ───────────────────────────
  # Act on Google Docs (mimeType application/vnd.google-apps.document). Create
  # a Doc with create_file (mime_type application/vnd.google-apps.document),
  # then edit it here. For plain-text READING, prefer export_file — it is far
  # simpler than doc_get. Free-text fields are *_json args: pass a JSON-encoded
  # string (e.g. "\"Line one\\nLine two\"") because the request body is
  # assembled as raw JSON and the engine does not escape values — a bare
  # newline or quote in a normal string arg would corrupt the body.

  - name: doc_get
    description: |
      Fetch the full structured content of a Google Doc by its file ID.
      Returns the Docs API document resource — paragraphs and the character
      indices needed for precise edits. For simply reading the text, prefer
      export_file (Doc → text/plain); use doc_get only when you need element
      indices. Required arg: document_id.
    grant_categories: [read]
    args:
      document_id:
        type: string
        required: true
    output: json
    http:
      method: GET
      url: "https://docs.googleapis.com/v1/documents/{{args.document_id}}"
      headers:
        Authorization: "Bearer {{credentials.user_token.access_token}}"
      response:
        success_status: [200]

  - name: doc_append_text
    description: |
      Append text to the end of a Google Doc's body. Required args:
      document_id, text_json (the text to append, as a JSON-encoded string —
      e.g. "\"Hello\\nWorld\"" — which preserves newlines and quotes).
      Returns the batchUpdate reply.
    grant_categories: [write]
    args:
      document_id:
        type: string
        required: true
      text_json:
        type: string
        required: true
    output: json
    http:
      method: POST
      url: "https://docs.googleapis.com/v1/documents/{{args.document_id}}:batchUpdate"
      headers:
        Authorization: "Bearer {{credentials.user_token.access_token}}"
        Content-Type: application/json
      body: |
        {"requests":[{"insertText":{"endOfSegmentLocation":{},"text":{{args.text_json}}}}]}
      response:
        success_status: [200]

  - name: doc_replace_text
    description: |
      Find and replace every occurrence of a literal string in a Google Doc
      (case-sensitive). Ideal for filling placeholders in a template doc.
      Required args: document_id, find_json (text to find, JSON-encoded
      string), replace_json (replacement, JSON-encoded string; pass "\"\"" to
      delete the matched text). Returns the number of replacements made.
    grant_categories: [write]
    args:
      document_id:
        type: string
        required: true
      find_json:
        type: string
        required: true
      replace_json:
        type: string
        required: true
    output: json
    http:
      method: POST
      url: "https://docs.googleapis.com/v1/documents/{{args.document_id}}:batchUpdate"
      headers:
        Authorization: "Bearer {{credentials.user_token.access_token}}"
        Content-Type: application/json
      body: |
        {"requests":[{"replaceAllText":{"containsText":{"text":{{args.find_json}},"matchCase":true},"replaceText":{{args.replace_json}}}}]}
      response:
        success_status: [200]

  # ── Google Sheets (spreadsheet values) ──────────────────────────────
  # Act on Google Sheets (mimeType application/vnd.google-apps.spreadsheet).
  # `range` is A1 notation, e.g. "Sheet1!A1:D100". Percent-encode the range if
  # a tab name contains spaces or special characters (space→%20, '→%27) — the
  # engine does not URL-encode. Cell data is a 2D array passed as values_json
  # (a JSON-encoded array of rows).

  - name: sheet_get
    description: |
      Fetch a spreadsheet's metadata: its title and the list of tabs (sheets)
      with sheetId, title, and grid dimensions. Use this to discover tab names
      before reading or writing ranges. Required arg: spreadsheet_id.
    grant_categories: [read]
    args:
      spreadsheet_id:
        type: string
        required: true
    output: json
    http:
      method: GET
      url: "https://sheets.googleapis.com/v4/spreadsheets/{{args.spreadsheet_id}}?fields=spreadsheetId,properties(title),sheets(properties(sheetId,title,gridProperties))"
      headers:
        Authorization: "Bearer {{credentials.user_token.access_token}}"
      response:
        success_status: [200]

  - name: sheet_read_range
    description: |
      Read the cell values in an A1 range. Required args: spreadsheet_id,
      range (A1 notation, e.g. "Sheet1!A1:D50"). Returns { range,
      majorDimension, values } where values is a 2D array of rows; empty
      trailing cells and rows are omitted.
    grant_categories: [read]
    args:
      spreadsheet_id:
        type: string
        required: true
      range:
        type: string
        required: true
    output: json
    http:
      method: GET
      url: "https://sheets.googleapis.com/v4/spreadsheets/{{args.spreadsheet_id}}/values/{{args.range}}"
      headers:
        Authorization: "Bearer {{credentials.user_token.access_token}}"
      response:
        success_status: [200]

  - name: sheet_update_range
    description: |
      Overwrite the cell values in an A1 range. Required args: spreadsheet_id,
      range (the top-left anchor determines where writing begins), values_json
      (a JSON-encoded 2D array of rows, e.g. "[[\"Name\",\"Qty\"],[\"Widget\",3]]").
      Values are parsed as if typed into the UI — numbers, dates, and formulas
      beginning with = are interpreted. Returns updatedCells / updatedRange.
    grant_categories: [write]
    args:
      spreadsheet_id:
        type: string
        required: true
      range:
        type: string
        required: true
      values_json:
        type: string
        required: true
    output: json
    http:
      method: PUT
      url: "https://sheets.googleapis.com/v4/spreadsheets/{{args.spreadsheet_id}}/values/{{args.range}}?valueInputOption=USER_ENTERED"
      headers:
        Authorization: "Bearer {{credentials.user_token.access_token}}"
        Content-Type: application/json
      body: |
        {"values": {{args.values_json}}}
      response:
        success_status: [200]

  - name: sheet_append_rows
    description: |
      Append rows after the last row of data in the range's table. Required
      args: spreadsheet_id, range (any A1 range touching the target table,
      e.g. "Sheet1!A1"), values_json (JSON-encoded 2D array of rows to add).
      New rows are inserted; existing data is not overwritten. Values are
      parsed as if typed into the UI. Returns the append summary.
    grant_categories: [write]
    args:
      spreadsheet_id:
        type: string
        required: true
      range:
        type: string
        required: true
      values_json:
        type: string
        required: true
    output: json
    http:
      method: POST
      url: "https://sheets.googleapis.com/v4/spreadsheets/{{args.spreadsheet_id}}/values/{{args.range}}:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS"
      headers:
        Authorization: "Bearer {{credentials.user_token.access_token}}"
        Content-Type: application/json
      body: |
        {"values": {{args.values_json}}}
      response:
        success_status: [200]

  - name: sheet_clear_range
    description: |
      Clear the values in an A1 range (cell formatting is preserved). Required
      args: spreadsheet_id, range. Returns the cleared range.
    grant_categories: [write, destructive]
    args:
      spreadsheet_id:
        type: string
        required: true
      range:
        type: string
        required: true
    output: json
    http:
      method: POST
      url: "https://sheets.googleapis.com/v4/spreadsheets/{{args.spreadsheet_id}}/values/{{args.range}}:clear"
      headers:
        Authorization: "Bearer {{credentials.user_token.access_token}}"
        Content-Type: application/json
      body: "{}"
      response:
        success_status: [200]

  - name: sheet_add_tab
    description: |
      Add a new tab (sheet) to a spreadsheet. Required args: spreadsheet_id,
      title (the new tab's name — keep it simple; a double-quote in the title
      is not supported). Returns the batchUpdate reply including the new
      sheetId. Fails if a tab with that title already exists.
    grant_categories: [write]
    args:
      spreadsheet_id:
        type: string
        required: true
      title:
        type: string
        required: true
    output: json
    http:
      method: POST
      url: "https://sheets.googleapis.com/v4/spreadsheets/{{args.spreadsheet_id}}:batchUpdate"
      headers:
        Authorization: "Bearer {{credentials.user_token.access_token}}"
        Content-Type: application/json
      body: |
        {"requests":[{"addSheet":{"properties":{"title":"{{args.title}}"}}}]}
      response:
        success_status: [200]

  # ── Google Slides (presentation editing) ────────────────────────────
  # Act on Google Slides (mimeType application/vnd.google-apps.presentation).
  # Create a deck with create_file (mime_type application/vnd.google-apps.presentation),
  # then edit here. Free-text fields are *_json (JSON-encoded strings), same
  # rule as Docs.

  - name: slides_get
    description: |
      Fetch a presentation's structure: its slides and, per slide, the page
      elements with their objectIds and any text. Use this to enumerate slides
      or find the objectId of a text box. Required arg: presentation_id.
    grant_categories: [read]
    args:
      presentation_id:
        type: string
        required: true
    output: json
    http:
      method: GET
      url: "https://slides.googleapis.com/v1/presentations/{{args.presentation_id}}?fields=presentationId,title,slides(objectId,pageElements(objectId,shape(shapeType,text)))"
      headers:
        Authorization: "Bearer {{credentials.user_token.access_token}}"
      response:
        success_status: [200]

  - name: slides_replace_text
    description: |
      Find and replace every occurrence of a literal string across all slides
      (case-sensitive). Ideal for filling placeholders in a template deck.
      Required args: presentation_id, find_json (JSON-encoded string),
      replace_json (JSON-encoded string). Returns the number of replacements.
    grant_categories: [write]
    args:
      presentation_id:
        type: string
        required: true
      find_json:
        type: string
        required: true
      replace_json:
        type: string
        required: true
    output: json
    http:
      method: POST
      url: "https://slides.googleapis.com/v1/presentations/{{args.presentation_id}}:batchUpdate"
      headers:
        Authorization: "Bearer {{credentials.user_token.access_token}}"
        Content-Type: application/json
      body: |
        {"requests":[{"replaceAllText":{"containsText":{"text":{{args.find_json}},"matchCase":true},"replaceText":{{args.replace_json}}}}]}
      response:
        success_status: [200]

  - name: slides_add_slide
    description: |
      Append a new slide using a predefined layout. Required arg:
      presentation_id. Optional arg: layout (one of BLANK, TITLE,
      TITLE_AND_BODY, TITLE_ONLY, SECTION_HEADER, CAPTION_ONLY, BIG_NUMBER;
      defaults to TITLE_AND_BODY). Returns the new slide's objectId. To fill
      the new slide's text, read it back with slides_get, then use
      slides_replace_text on its placeholder text.
    grant_categories: [write]
    args:
      presentation_id:
        type: string
        required: true
      layout:
        type: string
        required: false
    output: json
    http:
      method: POST
      url: "https://slides.googleapis.com/v1/presentations/{{args.presentation_id}}:batchUpdate"
      headers:
        Authorization: "Bearer {{credentials.user_token.access_token}}"
        Content-Type: application/json
      body: |
        {"requests":[{"createSlide":{"slideLayoutReference":{"predefinedLayout":"{{args.layout || "TITLE_AND_BODY"}}"}}}]}
      response:
        success_status: [200]

  # ── Drive: copy & comments ──────────────────────────────────────────
  # copy_file and the comment_* verbs are Drive-API calls, so on this OAuth
  # connection they reach only files Hearth created (drive.file) — copying a
  # template the user made by hand, or reading comments on a shared file, needs
  # the service-account plugin or the restricted drive scope.

  - name: copy_file
    description: |
      Make a copy of a file. Required args: file_id (the file to copy), name
      (the copy's name). Optional arg: parent_id (destination folder; omitted →
      the connection's base folder, or My Drive root). Returns the new file's
      id and webViewLink. Ideal for duplicating a template (e.g. a letter or
      invoice Doc/Sheet) before filling it in with the doc_*/sheet_* verbs.
    grant_categories: [write]
    args:
      file_id:
        type: string
        required: true
      name:
        type: string
        required: true
      parent_id:
        type: string
        required: false
    output: json
    http:
      method: POST
      url: "https://www.googleapis.com/drive/v3/files/{{args.file_id}}/copy?fields=id,name,webViewLink&supportsAllDrives=true"
      headers:
        Authorization: "Bearer {{credentials.user_token.access_token}}"
        Content-Type: application/json
      body: |
        {"name": "{{args.name}}", "parents": ["{{args.parent_id || config.root_folder_id || "root"}}"]}
      response:
        success_status: [200]

  - name: comment_list
    description: |
      List the comments on a file (Doc, Sheet, or Slides). Required arg:
      file_id. Returns each comment's id, content, author, createdTime,
      resolved flag, and its replies. Use comment_reply to respond.
    grant_categories: [read]
    args:
      file_id:
        type: string
        required: true
    output: json
    http:
      method: GET
      url: "https://www.googleapis.com/drive/v3/files/{{args.file_id}}/comments?fields=comments(id,content,author(displayName),createdTime,resolved,replies(id,content,author(displayName),createdTime))&supportsAllDrives=true"
      headers:
        Authorization: "Bearer {{credentials.user_token.access_token}}"
      response:
        success_status: [200]

  - name: comment_create
    description: |
      Add a new file-level comment to a file. Required args: file_id,
      content_json (the comment text, as a JSON-encoded string). Returns the
      new comment's id. To respond to an existing comment, use comment_reply.
    grant_categories: [write]
    args:
      file_id:
        type: string
        required: true
      content_json:
        type: string
        required: true
    output: json
    http:
      method: POST
      url: "https://www.googleapis.com/drive/v3/files/{{args.file_id}}/comments?fields=id,content,createdTime&supportsAllDrives=true"
      headers:
        Authorization: "Bearer {{credentials.user_token.access_token}}"
        Content-Type: application/json
      body: |
        {"content": {{args.content_json}}}
      response:
        success_status: [200, 201]

  - name: comment_reply
    description: |
      Reply to an existing comment on a file. Required args: file_id,
      comment_id (from comment_list), content_json (the reply text, as a
      JSON-encoded string). Returns the new reply's id.
    grant_categories: [write]
    args:
      file_id:
        type: string
        required: true
      comment_id:
        type: string
        required: true
      content_json:
        type: string
        required: true
    output: json
    http:
      method: POST
      url: "https://www.googleapis.com/drive/v3/files/{{args.file_id}}/comments/{{args.comment_id}}/replies?fields=id,content,createdTime&supportsAllDrives=true"
      headers:
        Authorization: "Bearer {{credentials.user_token.access_token}}"
        Content-Type: application/json
      body: |
        {"content": {{args.content_json}}}
      response:
        success_status: [200, 201]

  # ── Google Docs: advanced editing ───────────────────────────────────
  # Index-based verbs use character indices from doc_get. Free text is *_json.

  - name: doc_insert_text_at
    description: |
      Insert text at a specific character index in a Google Doc (get indices
      from doc_get). Required args: document_id, index (integer ≥ 1; 1 is the
      start of the body), text_json (JSON-encoded string). To append at the
      end instead, use doc_append_text.
    grant_categories: [write]
    args:
      document_id:
        type: string
        required: true
      index:
        type: int
        required: true
      text_json:
        type: string
        required: true
    output: json
    http:
      method: POST
      url: "https://docs.googleapis.com/v1/documents/{{args.document_id}}:batchUpdate"
      headers:
        Authorization: "Bearer {{credentials.user_token.access_token}}"
        Content-Type: application/json
      body: |
        {"requests":[{"insertText":{"location":{"index":{{args.index}}},"text":{{args.text_json}}}}]}
      response:
        success_status: [200]

  - name: doc_delete_range
    description: |
      Delete the content between two character indices in a Google Doc (get
      indices from doc_get; the range is [start_index, end_index), end
      exclusive). Required args: document_id, start_index, end_index. To remove
      text by matching it instead, use doc_replace_text with an empty
      replacement.
    grant_categories: [write, destructive]
    args:
      document_id:
        type: string
        required: true
      start_index:
        type: int
        required: true
      end_index:
        type: int
        required: true
    output: json
    http:
      method: POST
      url: "https://docs.googleapis.com/v1/documents/{{args.document_id}}:batchUpdate"
      headers:
        Authorization: "Bearer {{credentials.user_token.access_token}}"
        Content-Type: application/json
      body: |
        {"requests":[{"deleteContentRange":{"range":{"startIndex":{{args.start_index}},"endIndex":{{args.end_index}}}}}]}
      response:
        success_status: [200]

  - name: doc_format_text
    description: |
      Apply character formatting to a range in a Google Doc. Required args:
      document_id, start_index, end_index (from doc_get), style_json (a
      JSON-encoded Docs TextStyle object — e.g. {"bold":true},
      {"link":{"url":"https://example.com"}}, or
      {"foregroundColor":{"color":{"rgbColor":{"red":1}}}}), and fields (a
      comma-separated mask naming exactly the TextStyle fields you set — e.g.
      "bold", "link", "foregroundColor"; use "*" to replace the whole style).
      For paragraph-level changes like headings, this verb does not apply —
      those use a different Docs request type not exposed here.
    grant_categories: [write]
    args:
      document_id:
        type: string
        required: true
      start_index:
        type: int
        required: true
      end_index:
        type: int
        required: true
      style_json:
        type: string
        required: true
      fields:
        type: string
        required: true
    output: json
    http:
      method: POST
      url: "https://docs.googleapis.com/v1/documents/{{args.document_id}}:batchUpdate"
      headers:
        Authorization: "Bearer {{credentials.user_token.access_token}}"
        Content-Type: application/json
      body: |
        {"requests":[{"updateTextStyle":{"range":{"startIndex":{{args.start_index}},"endIndex":{{args.end_index}}},"textStyle":{{args.style_json}},"fields":"{{args.fields}}"}}]}
      response:
        success_status: [200]

  # ── Google Sheets: tab management ────────────────────────────────────
  # sheet_id is the numeric sheetId from sheet_get (not the tab's title).

  - name: sheet_duplicate_tab
    description: |
      Duplicate a tab within a spreadsheet. Required args: spreadsheet_id,
      sheet_id (numeric sheetId of the tab to copy, from sheet_get), new_title
      (name for the duplicate). Returns the new tab's properties.
    grant_categories: [write]
    args:
      spreadsheet_id:
        type: string
        required: true
      sheet_id:
        type: int
        required: true
      new_title:
        type: string
        required: true
    output: json
    http:
      method: POST
      url: "https://sheets.googleapis.com/v4/spreadsheets/{{args.spreadsheet_id}}:batchUpdate"
      headers:
        Authorization: "Bearer {{credentials.user_token.access_token}}"
        Content-Type: application/json
      body: |
        {"requests":[{"duplicateSheet":{"sourceSheetId":{{args.sheet_id}},"newSheetName":"{{args.new_title}}"}}]}
      response:
        success_status: [200]

  - name: sheet_delete_tab
    description: |
      Delete a tab from a spreadsheet. Required args: spreadsheet_id, sheet_id
      (numeric sheetId from sheet_get). Permanently removes the tab and its
      data — the spreadsheet must keep at least one tab.
    grant_categories: [write, destructive]
    args:
      spreadsheet_id:
        type: string
        required: true
      sheet_id:
        type: int
        required: true
    output: json
    http:
      method: POST
      url: "https://sheets.googleapis.com/v4/spreadsheets/{{args.spreadsheet_id}}:batchUpdate"
      headers:
        Authorization: "Bearer {{credentials.user_token.access_token}}"
        Content-Type: application/json
      body: |
        {"requests":[{"deleteSheet":{"sheetId":{{args.sheet_id}}}}]}
      response:
        success_status: [200]

  # ── Google Slides: text insertion ───────────────────────────────────

  - name: slides_insert_text
    description: |
      Insert text into an existing shape or text box on a slide. Required args:
      presentation_id, object_id (the shape's objectId, from slides_get),
      text_json (JSON-encoded string). Optional arg: insertion_index (integer
      character offset; defaults to 0, the start of the shape's text).
    grant_categories: [write]
    args:
      presentation_id:
        type: string
        required: true
      object_id:
        type: string
        required: true
      text_json:
        type: string
        required: true
      insertion_index:
        type: int
        required: false
    output: json
    http:
      method: POST
      url: "https://slides.googleapis.com/v1/presentations/{{args.presentation_id}}:batchUpdate"
      headers:
        Authorization: "Bearer {{credentials.user_token.access_token}}"
        Content-Type: application/json
      body: |
        {"requests":[{"insertText":{"objectId":"{{args.object_id}}","insertionIndex":{{args.insertion_index || "0"}},"text":{{args.text_json}}}}]}
      response:
        success_status: [200]

snapshot:
  description: |
    List up to 50 non-trashed files visible to the connected user.
    Used to scope IAM rules to specific Drive items.
  http:
    method: GET
    url: "https://www.googleapis.com/drive/v3/files?q=trashed=false&pageSize=50&fields=files(id,name,mimeType,parents)&supportsAllDrives=true&includeItemsFromAllDrives=true"
    headers:
      Authorization: "Bearer {{credentials.user_token.access_token}}"
    response:
      success_status: [200]
  extract:
    iterate: "$.files[*]"
    entity_id: "$.id"
    kind:
      literal: gdrive.item
    labels:
      name: "$.name"
      mime_type: "$.mimeType"

